<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScanner IA - Identificador Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; transition: background-color 0.5s ease; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .mode-active { transform: scale(1.05); border-width: 3px !important; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid currentColor;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-enter { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header id="main-header" class="bg-slate-900 text-white py-8 px-6 shadow-2xl transition-colors duration-500">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">OmniScanner IA</h1>
            <p id="header-subtitle" class="text-slate-400 text-sm">Explora y descubre el mundo natural</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 -mt-6">
        
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 px-1 no-scrollbar">
            <button onclick="setMode('botany')" id="btn-botany" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl border-2 border-transparent transition-all min-w-[80px]">
                <span class="text-2xl">🌿</span>
                <span class="text-[10px] font-bold mt-1 uppercase">Plantas</span>
            </button>
            <button onclick="setMode('medicinal')" id="btn-medicinal" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl border-2 border-transparent transition-all min-w-[80px]">
                <span class="text-2xl">💊</span>
                <span class="text-[10px] font-bold mt-1 uppercase">Medicinal</span>
            </button>
            <button onclick="setMode('edible')" id="btn-edible" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl border-2 border-transparent transition-all min-w-[80px]">
                <span class="text-2xl">🥗</span>
                <span class="text-[10px] font-bold mt-1 uppercase">Comer</span>
            </button>
            <button onclick="setMode('insect')" id="btn-insect" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl border-2 border-transparent transition-all min-w-[80px]">
                <span class="text-2xl">🪲</span>
                <span class="text-[10px] font-bold mt-1 uppercase">Bichos</span>
            </button>
            <button onclick="setMode('mushroom')" id="btn-mushroom" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl border-2 border-transparent transition-all min-w-[80px]">
                <span class="text-2xl">🍄</span>
                <span class="text-[10px] font-bold mt-1 uppercase">Setas</span>
            </button>
            <button onclick="setMode('fish')" id="btn-fish" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl border-2 border-transparent transition-all min-w-[80px]">
                <span class="text-2xl">🐟</span>
                <span class="text-[10px] font-bold mt-1 uppercase">Peces</span>
            </button>
        </div>

        <div id="safety-alert" class="hidden bg-red-50 border-2 border-red-500 text-red-800 p-4 rounded-2xl mb-6 text-sm items-start gap-3">
            <span class="text-xl">⚠️</span>
            <p id="safety-text"></p>
        </div>

        <div class="glass rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/50">
            <div class="p-6">
                <div id="viewport-container" class="relative h-80 sm:h-96 w-full rounded-3xl overflow-hidden bg-slate-200 border-2 border-dashed border-slate-300 transition-all flex items-center justify-center mb-6">
                    <video id="video-feed" class="hidden" autoplay muted playsinline></video>
                    <canvas id="capture-canvas" class="hidden"></canvas>
                    
                    <div id="preview-container" class="hidden w-full h-full p-2">
                        <img id="image-preview" class="w-full h-full object-contain rounded-2xl" src="" alt="Captura">
                    </div>

                    <div id="initial-ui" class="text-center p-8 cursor-pointer" onclick="document.getElementById('file-input').click()">
                        <div id="mode-icon-large" class="text-6xl mb-4 transition-transform hover:scale-110 duration-300">🌿</div>
                        <p class="text-slate-600 font-semibold">Toca para subir o usa la cámara</p>
                        <p class="text-slate-400 text-xs mt-2">Formatos aceptados: JPG, PNG, WEBP</p>
                    </div>
                </div>

                <input type="file" id="file-input" accept="image/*" class="hidden">

                <div class="flex flex-col gap-3">
                    <div class="grid grid-cols-2 gap-3">
                        <button id="camera-toggle-btn" class="bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 rounded-2xl hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                            <span>📷 Cámara</span>
                        </button>
                        <button id="capture-btn" class="hidden bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-orange-200 transition-all">
                            Capturar Foto
                        </button>
                        <button id="gallery-btn" class="bg-slate-100 text-slate-700 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                            <span>📁 Galería</span>
                        </button>
                        <button id="reset-btn" class="hidden bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl transition-all">
                            Nueva Foto
                        </button>
                    </div>
                    
                    <button id="analyze-btn" disabled class="w-full bg-slate-900 disabled:bg-slate-300 text-white font-black py-5 rounded-2xl transition-all shadow-xl flex items-center justify-center gap-3 uppercase tracking-widest text-sm">
                        <span>Iniciar Escaneo Inteligente</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="loading-state" class="hidden mt-10 text-center p-10 glass rounded-[2.5rem] animate-pulse">
            <div id="loader-icon" class="loader mx-auto mb-4 text-slate-900"></div>
            <p id="loading-text" class="text-slate-800 font-bold tracking-tight">Consultando base de datos...</p>
        </div>

        <div id="results-area" class="hidden mt-10 result-enter">
            <div id="result-card" class="glass rounded-[2.5rem] p-8 shadow-2xl border-l-[12px]">
                <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-6">
                    <div>
                        <h3 id="res-name" class="text-4xl font-black text-slate-900 leading-tight">Nombre</h3>
                        <p id="res-scientific" class="text-slate-500 italic font-medium text-lg"></p>
                    </div>
                    <div id="res-badge" class="px-5 py-2 rounded-full text-xs font-black uppercase tracking-tighter shadow-sm"></div>
                </div>

                <div id="res-grid" class="grid grid-cols-2 gap-4 mb-8">
                    </div>

                <div class="space-y-6">
                    <div class="bg-white/40 p-5 rounded-3xl border border-white/60">
                        <h4 class="font-bold text-slate-900 mb-2 flex items-center gap-2">
                            🔍 Descripción General
                        </h4>
                        <p id="res-description" class="text-slate-600 leading-relaxed text-sm"></p>
                    </div>

                    <div id="special-info-box" class="p-5 rounded-3xl border">
                        <h4 id="special-title" class="font-bold mb-2 flex items-center gap-2"></h4>
                        <p id="special-content" class="text-sm leading-relaxed"></p>
                    </div>
                </div>

                <div id="warning-box" class="hidden mt-6 bg-red-50 p-5 rounded-3xl border border-red-100 flex items-start gap-3">
                    <span class="text-xl">🛑</span>
                    <div>
                        <h4 class="font-bold text-red-700 text-sm">Advertencia Crítica</h4>
                        <p id="res-warning" class="text-red-600 text-xs mt-1 leading-normal"></p>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-slate-100">
                    <p id="res-fact" class="text-slate-400 italic text-xs text-center"></p>
                </div>
            </div>
        </div>

        <div id="error-box" class="hidden mt-6 bg-red-100 border border-red-200 text-red-700 px-6 py-4 rounded-2xl text-center font-bold"></div>
    </main>

    <script>
        // AQUÍ HE PUESTO TU CLAVE API
        const apiKey = "AIzaSyDZuCTFKhlSTWKgPiK5w8td2FqfHjrlisM";
        let currentMode = 'botany';
        let base64Image = null;
        let stream = null;

        const config = {
            botany: { 
                name: "Botánica", color: "#065f46", icon: "🌿", bg: "#f0fdf4", 
                prompt: "Identifica la planta. JSON: nombre, cientifico, habitat, cuidados, descripcion, datoCurioso",
                safety: ""
            },
            medicinal: { 
                name: "Plantas Medicinales", color: "#0d9488", icon: "💊", bg: "#f0fdfa", 
                prompt: "Identifica la planta medicinal y sus propiedades curativas. JSON: nombre, cientifico, propiedadesTerapeuticas, principiosActivos, formaUso, contraindicaciones, descripcion, datoCurioso",
                safety: "ADVERTENCIA: Esta información es educativa. No sustituye el consejo médico profesional. Las plantas pueden interactuar con medicamentos."
            },
            edible: { 
                name: "Comestibles", color: "#3f6212", icon: "🥗", bg: "#f7fee7", 
                prompt: "Analiza comestibilidad. JSON: nombre, cientifico, comestibilidad (SÍ/NO), partesComestibles, preparacion, descripcion, advertencia, datoCurioso",
                safety: "Aviso: Muchas plantas tienen gemelos tóxicos. No consumas nada sin certeza absoluta."
            },
            insect: { 
                name: "Entomología", color: "#92400e", icon: "🪲", bg: "#fffbeb", 
                prompt: "Identifica el insecto. JSON: nombre, cientifico, peligrosidad, dieta, habitat, descripcion, datoCurioso",
                safety: ""
            },
            mushroom: { 
                name: "Micología", color: "#78350f", icon: "🍄", bg: "#fdf8f4", 
                prompt: "Analiza la seta. JSON: nombre, cientifico, comestibilidad, confusionPeligrosa, temporada, descripcion, advertencia, datoCurioso",
                safety: "PELIGRO: La identificación de setas por foto es orientativa. Las consecuencias de un error pueden ser mortales."
            },
            fish: { 
                name: "Ictiología", color: "#075985", icon: "🐟", bg: "#f0f9ff", 
                prompt: "Identifica el pez. JSON: nombre, cientifico, tipoAgua, conservacion, habitat, descripcion, datoCurioso",
                safety: ""
            }
        };

        const ui = {
            video: document.getElementById('video-feed'),
            canvas: document.getElementById('capture-canvas'),
            fileInput: document.getElementById('file-input'),
            analyzeBtn: document.getElementById('analyze-btn'),
            cameraBtn: document.getElementById('camera-toggle-btn'),
            captureBtn: document.getElementById('capture-btn'),
            resetBtn: document.getElementById('reset-btn'),
            galleryBtn: document.getElementById('gallery-btn'),
            preview: document.getElementById('preview-container'),
            image: document.getElementById('image-preview'),
            initial: document.getElementById('initial-ui'),
            loading: document.getElementById('loading-state'),
            results: document.getElementById('results-area'),
            error: document.getElementById('error-box'),
            safety: document.getElementById('safety-alert'),
            safetyText: document.getElementById('safety-text'),
            header: document.getElementById('main-header'),
            largeIcon: document.getElementById('mode-icon-large')
        };

        function setMode(mode) {
            currentMode = mode;
            const c = config[mode];
            
            // Actualizar UI
            document.body.style.backgroundColor = c.bg;
            ui.header.style.backgroundColor = c.color;
            ui.largeIcon.textContent = c.icon;
            ui.analyzeBtn.style.backgroundColor = c.color;
            document.getElementById('header-subtitle').textContent = `Modo: ${c.name}`;
            
            // Marcar botón activo
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('mode-active');
                btn.style.borderColor = 'transparent';
            });
            const activeBtn = document.getElementById(`btn-${mode}`);
            activeBtn.classList.add('mode-active');
            activeBtn.style.borderColor = c.color;

            // Safety alert
            if (c.safety) {
                ui.safetyText.textContent = c.safety;
                ui.safety.classList.remove('hidden');
                ui.safety.classList.add('flex');
            } else {
                ui.safety.classList.add('hidden');
                ui.safety.classList.remove('flex');
            }

            resetUI();
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                ui.video.srcObject = stream;
                await ui.video.play();
                ui.video.classList.remove('hidden');
                ui.initial.classList.add('hidden');
                ui.preview.classList.add('hidden');
                ui.cameraBtn.classList.add('hidden');
                ui.galleryBtn.classList.add('hidden');
                ui.captureBtn.classList.remove('hidden');
                ui.resetBtn.classList.remove('hidden');
            } catch (err) {
                showError("No se pudo abrir la cámara.");
            }
        }

        function stopCamera() {
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            ui.video.classList.add('hidden');
        }

        function capture() {
            ui.canvas.width = ui.video.videoWidth;
            ui.canvas.height = ui.video.videoHeight;
            ui.canvas.getContext('2d').drawImage(ui.video, 0, 0);
            const data = ui.canvas.toDataURL('image/jpeg');
            base64Image = data.split(',')[1];
            ui.image.src = data;
            stopCamera();
            ui.preview.classList.remove('hidden');
            ui.captureBtn.classList.add('hidden');
            ui.analyzeBtn.disabled = false;
        }

        function resetUI() {
            stopCamera();
            base64Image = null;
            ui.preview.classList.add('hidden');
            ui.initial.classList.remove('hidden');
            ui.cameraBtn.classList.remove('hidden');
            ui.galleryBtn.classList.remove('hidden');
            ui.captureBtn.classList.add('hidden');
            ui.resetBtn.classList.add('hidden');
            ui.analyzeBtn.disabled = true;
            ui.results.classList.add('hidden');
            ui.error.classList.add('hidden');
            ui.loading.classList.add('hidden');
        }

        ui.cameraBtn.onclick = startCamera;
        ui.captureBtn.onclick = capture;
        ui.resetBtn.onclick = resetUI;
        ui.galleryBtn.onclick = () => ui.fileInput.click();
        ui.fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = (ev) => {
                base64Image = ev.target.result.split(',')[1];
                ui.image.src = ev.target.result;
                ui.preview.classList.remove('hidden');
                ui.initial.classList.add('hidden');
                ui.cameraBtn.classList.add('hidden');
                ui.galleryBtn.classList.add('hidden');
                ui.resetBtn.classList.remove('hidden');
                ui.analyzeBtn.disabled = false;
            };
            r.readAsDataURL(file);
        };

        async function analyze() {
            if (!base64Image) return;
            ui.loading.classList.remove('hidden');
            ui.results.classList.add('hidden');
            ui.analyzeBtn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: `Análisis en modo ${config[currentMode].name}: ${config[currentMode].prompt}` },
                            { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                        ]}],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) renderResults(JSON.parse(text));
                else throw new Error("No hubo respuesta.");
            } catch (err) {
                showError("Error: " + err.message);
            } finally {
                ui.loading.classList.add('hidden');
                ui.analyzeBtn.disabled = false;
            }
        }

        function renderResults(res) {
            document.getElementById('res-name').textContent = res.nombre;
            document.getElementById('res-scientific').textContent = res.cientifico;
            document.getElementById('res-description').textContent = res.descripcion;
            document.getElementById('res-fact').textContent = res.datoCurioso || res.curiosidad;

            const grid = document.getElementById('res-grid');
            grid.innerHTML = '';
            
            const fields = [];
            if (currentMode === 'botany') fields.push({l: 'Hábitat', v: res.habitat}, {l: 'Cuidados', v: res.cuidados});
            if (currentMode === 'medicinal') fields.push({l: 'Propiedades', v: res.propiedadesTerapeuticas}, {l: 'Principios', v: res.principiosActivos});
            if (currentMode === 'edible') fields.push({l: 'Partes', v: res.partesComestibles}, {l: 'Preparación', v: res.preparacion});
            if (currentMode === 'insect') fields.push({l: 'Riesgo', v: res.peligrosidad}, {l: 'Dieta', v: res.dieta});
            if (currentMode === 'mushroom') fields.push({l: 'Comestibilidad', v: res.comestibilidad}, {l: 'Temporada', v: res.temporada});
            if (currentMode === 'fish') fields.push({l: 'Agua', v: res.tipoAgua}, {l: 'Estado', v: res.conservacion});

            fields.forEach(f => {
                grid.innerHTML += `<div class="bg-white/50 p-4 rounded-2xl border border-white/80">
                    <span class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">${f.l}</span>
                    <p class="text-sm font-bold text-slate-800">${f.v}</p>
                </div>`;
            });

            const card = document.getElementById('result-card');
            const warnBox = document.getElementById('warning-box');
            card.style.borderLeftColor = config[currentMode].color;
            
            const special = document.getElementById('special-info-box');
            if (res.formaUso || res.contraindicaciones || res.preparacion || res.confusionPeligrosa) {
                special.classList.remove('hidden');
                special.style.borderColor = config[currentMode].color + '33';
                special.style.backgroundColor = config[currentMode].color + '0a';
                
                if (currentMode === 'medicinal') {
                    document.getElementById('special-title').textContent = "🍵 Uso y Precauciones";
                    document.getElementById('special-content').innerHTML = `<b>Forma de uso:</b> ${res.formaUso}<br><br><b>Contraindicaciones:</b> ${res.contraindicaciones}`;
                } else {
                    document.getElementById('special-title').textContent = currentMode === 'edible' ? "👨‍🍳 Preparación" : "📍 Notas";
                    document.getElementById('special-content').textContent = res.preparacion || res.confusionPeligrosa || res.habitat;
                }
            } else {
                special.classList.add('hidden');
            }

            if (res.advertencia || res.contraindicaciones || res.confusionPeligrosa) {
                document.getElementById('res-warning').textContent = res.advertencia || res.contraindicaciones || res.confusionPeligrosa;
                warnBox.classList.remove('hidden');
            } else {
                warnBox.classList.add('hidden');
            }

            ui.results.classList.remove('hidden');
            ui.results.scrollIntoView({ behavior: 'smooth' });
        }

        function showError(m) {
            ui.error.textContent = m;
            ui.error.classList.remove('hidden');
            ui.loading.classList.add('hidden');
        }

        ui.analyzeBtn.onclick = analyze;
        setMode('botany');
    </script>
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBrM3Akf9rh-HVNOgA9BhhRczAz2-yRG3w",
    authDomain: "omniscanner-ia.firebaseapp.com",
    projectId: "omniscanner-ia",
    storageBucket: "omniscanner-ia.firebasestorage.app",
    messagingSenderId: "989131635135",
    appId: "1:989131635135:web:86b52e4937ba53ce5f490a",
    measurementId: "G-1P44PWC8QJ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  console.log("¡Firebase conectado!");
</script>
</body> 
</html>
