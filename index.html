<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScanner IA - Identificador Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .mode-active { transform: scale(1.05); border: 3px solid currentColor !important; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header id="main-header" class="bg-slate-900 text-white py-8 px-6 shadow-2xl text-center">
        <h1 class="text-3xl font-extrabold tracking-tight">OmniScanner IA</h1>
        <p id="header-subtitle" class="text-slate-400 text-sm">Explora y descubre el mundo natural</p>
    </header>

    <main class="max-w-2xl mx-auto px-4 -mt-6">
        
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 px-1">
            <button onclick="setMode('botany')" id="btn-botany" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl min-w-[80px]">🌿<span class="text-[10px] font-bold mt-1 uppercase">Plantas</span></button>
            <button onclick="setMode('medicinal')" id="btn-medicinal" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl min-w-[80px]">💊<span class="text-[10px] font-bold mt-1 uppercase">Medicinal</span></button>
            <button onclick="setMode('edible')" id="btn-edible" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl min-w-[80px]">🥗<span class="text-[10px] font-bold mt-1 uppercase">Comer</span></button>
            <button onclick="setMode('insect')" id="btn-insect" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl min-w-[80px]">🪲<span class="text-[10px] font-bold mt-1 uppercase">Bichos</span></button>
            <button onclick="setMode('mushroom')" id="btn-mushroom" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl min-w-[80px]">🍄<span class="text-[10px] font-bold mt-1 uppercase">Setas</span></button>
            <button onclick="setMode('fish')" id="btn-fish" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl min-w-[80px]">🐟<span class="text-[10px] font-bold mt-1 uppercase">Peces</span></button>
        </div>

        <div class="glass rounded-[2.5rem] shadow-2xl overflow-hidden p-6 border border-white/50">
            <div id="viewport-container" class="relative h-80 w-full rounded-3xl overflow-hidden bg-slate-200 mb-6 flex items-center justify-center border-2 border-dashed border-slate-300">
                <video id="video-feed" class="hidden" autoplay muted playsinline></video>
                <canvas id="capture-canvas" class="hidden"></canvas>
                <img id="image-preview" class="hidden w-full h-full object-contain rounded-2xl" src="">
                <div id="initial-ui" class="text-center p-8 cursor-pointer" onclick="document.getElementById('file-input').click()">
                    <div id="mode-icon-large" class="text-6xl mb-4">🌿</div>
                    <p class="text-slate-600 font-semibold text-sm">Toca para subir o usa la cámara</p>
                </div>
            </div>

            <input type="file" id="file-input" accept="image/*" class="hidden">

            <div class="flex flex-col gap-3">
                <div class="grid grid-cols-2 gap-3">
                    <button id="camera-btn" class="bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 rounded-2xl">📷 Cámara</button>
                    <button id="capture-btn" class="hidden bg-orange-500 text-white font-bold py-4 rounded-2xl">Capturar Foto</button>
                    <button id="gallery-btn" class="bg-slate-100 text-slate-700 font-bold py-4 rounded-2xl">📁 Galería</button>
                    <button id="reset-btn" class="hidden bg-slate-200 text-slate-700 font-bold py-4 rounded-2xl">Nueva Foto</button>
                </div>
                <button id="analyze-btn" disabled class="w-full bg-slate-900 disabled:bg-slate-300 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest text-sm">Iniciar Escaneo Inteligente</button>
            </div>
        </div>

        <div id="loading-state" class="hidden mt-10 text-center p-10 glass rounded-[2.5rem] animate-pulse">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-slate-800 font-bold">Consultando base de datos...</p>
        </div>

        <div id="results-area" class="hidden mt-10 glass rounded-[2.5rem] p-8 shadow-2xl border-l-[12px] border-slate-900">
            <h3 id="res-name" class="text-4xl font-black text-slate-900">Nombre</h3>
            <p id="res-scientific" class="text-slate-500 italic font-medium text-lg"></p>
            <div id="res-grid" class="grid grid-cols-2 gap-4 my-6"></div>
            <p id="res-description" class="text-slate-600 leading-relaxed text-sm bg-white/40 p-5 rounded-3xl"></p>
            <p id="res-fact" class="text-slate-400 italic text-xs text-center mt-6"></p>
        </div>

        <div id="error-box" class="hidden mt-6 bg-red-100 border border-red-200 text-red-700 px-6 py-4 rounded-2xl text-center font-bold"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TUS CLAVES (No tocar)
        const firebaseConfig = {
            apiKey: "AIzaSyBrM3Akf9rh-HVNOgA9BhhRczAz2-yRG3w",
            authDomain: "omniscanner-ia.firebaseapp.com",
            projectId: "omniscanner-ia",
            storageBucket: "omniscanner-ia.firebasestorage.app",
            messagingSenderId: "989131635135",
            appId: "1:989131635135:web:86b52e4937ba53ce5f490a"
        };
        const geminiKey = "AIzaSyDZuCTFKhlSTWKgPiK5w8td2FqfHjrlisM";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Variables de Estado
        let currentMode = 'botany';
        let base64Image = null;
        let stream = null;

        const config = {
            botany: { name: "Botánica", icon: "🌿", color: "#065f46", prompt: "Identifica la planta. JSON: nombre, cientifico, habitat, cuidados, descripcion, datoCurioso" },
            medicinal: { name: "Medicinal", icon: "💊", color: "#0d9488", prompt: "Identifica planta medicinal y sus usos. JSON: nombre, cientifico, propiedadesTerapeuticas, descripcion, datoCurioso" },
            edible: { name: "Comestibles", icon: "🥗", color: "#3f6212", prompt: "Analiza si se come. JSON: nombre, cientifico, comestibilidad, descripcion, datoCurioso" },
            insect: { name: "Bichos", icon: "🪲", color: "#92400e", prompt: "Identifica el bicho. JSON: nombre, cientifico, peligrosidad, descripcion, datoCurioso" },
            mushroom: { name: "Setas", icon: "🍄", color: "#78350f", prompt: "Analiza la seta. JSON: nombre, cientifico, comestibilidad, descripcion, datoCurioso" },
            fish: { name: "Peces", icon: "🐟", color: "#075985", prompt: "Identifica el pez. JSON: nombre, cientifico, tipoAgua, descripcion, datoCurioso" }
        };

        // UI Handlers
        window.setMode = (mode) => {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('mode-active'));
            const active = document.getElementById(`btn-${mode}`);
            active.classList.add('mode-active');
            active.style.color = config[mode].color;
            document.getElementById('mode-icon-large').textContent = config[mode].icon;
            document.getElementById('header-subtitle').textContent = `Modo: ${config[mode].name}`;
            resetUI();
        };

        const resetUI = () => {
            stopCamera();
            base64Image = null;
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('initial-ui').classList.remove('hidden');
            document.getElementById('capture-btn').classList.add('hidden');
            document.getElementById('reset-btn').classList.add('hidden');
            document.getElementById('camera-btn').classList.remove('hidden');
            document.getElementById('gallery-btn').classList.remove('hidden');
            document.getElementById('analyze-btn').disabled = true;
            document.getElementById('results-area').classList.add('hidden');
            document.getElementById('error-box').classList.add('hidden');
        };

        const stopCamera = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('video-feed').classList.add('hidden');
        };

        document.getElementById('camera-btn').onclick = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const v = document.getElementById('video-feed');
                v.srcObject = stream;
                v.classList.remove('hidden');
                document.getElementById('initial-ui').classList.add('hidden');
                document.getElementById('camera-btn').classList.add('hidden');
                document.getElementById('gallery-btn').classList.add('hidden');
                document.getElementById('capture-btn').classList.remove('hidden');
                document.getElementById('reset-btn').classList.remove('hidden');
            } catch (e) {
                alert("Error cámara: Ábrelo en Chrome y acepta los permisos.");
            }
        };

        document.getElementById('capture-btn').onclick = () => {
            const v = document.getElementById('video-feed');
            const c = document.getElementById('capture-canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            base64Image = c.toDataURL('image/jpeg').split(',')[1];
            document.getElementById('image-preview').src = c.toDataURL('image/jpeg');
            document.getElementById('image-preview').classList.remove('hidden');
            stopCamera();
            document.getElementById('capture-btn').classList.add('hidden');
            document.getElementById('analyze-btn').disabled = false;
        };

        document.getElementById('gallery-btn').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                base64Image = ev.target.result.split(',')[1];
                document.getElementById('image-preview').src = ev.target.result;
                document.getElementById('image-preview').classList.remove('hidden');
                document.getElementById('initial-ui').classList.add('hidden');
                document.getElementById('analyze-btn').disabled = false;
                document.getElementById('reset-btn').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('analyze-btn').onclick = async () => {
            const loading = document.getElementById('loading-state');
            loading.classList.remove('hidden');
            document.getElementById('analyze-btn').disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: `Modo ${config[currentMode].name}: ${config[currentMode].prompt}` },
                            { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                        ]}]
                    })
                });

                const data = await response.json();
                const cleanText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
                const result = JSON.parse(cleanText);

                // Mostrar
                document.getElementById('res-name').textContent = result.nombre;
                document.getElementById('res-scientific').textContent = result.cientifico;
                document.getElementById('res-description').textContent = result.descripcion;
                document.getElementById('res-fact').textContent = result.datoCurioso;
                document.getElementById('results-area').style.borderLeftColor = config[currentMode].color;
                document.getElementById('results-area').classList.remove('hidden');

                // Guardar en Firebase
                await addDoc(collection(db, "avistamientos"), {
                    ...result,
                    modo: currentMode,
                    fecha: new Date()
                });

            } catch (e) {
                document.getElementById('error-box').textContent = "No hubo respuesta de la IA. Revisa tu conexión.";
                document.getElementById('error-box').classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                document.getElementById('analyze-btn').disabled = false;
            }
        };

        setMode('botany');
    </script>
</body>
</html>
