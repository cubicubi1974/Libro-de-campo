<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScanner IA - Identificador Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; transition: background-color 0.5s ease; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); }
        .mode-active { transform: scale(1.05); border-width: 3px !important; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid currentColor; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header id="main-header" class="bg-slate-900 text-white py-8 px-6 shadow-2xl transition-colors duration-500">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">OmniScanner IA</h1>
            <p id="header-subtitle" class="text-slate-400 text-sm">Explora y descubre el mundo natural</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 -mt-6">
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 px-1 no-scrollbar">
            <button onclick="setMode('botany')" id="btn-botany" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl border-2 border-transparent transition-all min-w-[80px]">🌿</button>
            <button onclick="setMode('insect')" id="btn-insect" class="mode-btn flex-shrink-0 flex flex-col items-center p-3 glass rounded-2xl border-2 border-transparent transition-all min-w-[80px]">🪲</button>
            </div>

        <div class="glass rounded-[2.5rem] shadow-2xl overflow-hidden p-6">
            <div id="viewport-container" class="relative h-80 w-full rounded-3xl overflow-hidden bg-slate-200 mb-6 flex items-center justify-center">
                <video id="video-feed" class="hidden" autoplay muted playsinline></video>
                <canvas id="capture-canvas" class="hidden"></canvas>
                <img id="image-preview" class="hidden w-full h-full object-contain rounded-2xl" src="">
                <div id="initial-ui" onclick="document.getElementById('file-input').click()">Toca para subir o usar cámara</div>
            </div>

            <input type="file" id="file-input" accept="image/*" class="hidden">

            <div class="grid grid-cols-2 gap-3 mb-4">
                <button id="camera-btn" class="bg-white border p-4 rounded-2xl">📷 Cámara</button>
                <button id="capture-btn" class="hidden bg-orange-500 text-white p-4 rounded-2xl">Capturar</button>
                <button id="reset-btn" class="hidden bg-slate-200 p-4 rounded-2xl">Nueva</button>
            </div>
            
            <button id="analyze-btn" disabled class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black">INICIAR ESCANEO</button>
        </div>

        <div id="loading-state" class="hidden mt-4 text-center p-10 glass rounded-3xl animate-pulse">Consultando IA...</div>
        <div id="results-area" class="hidden mt-4 glass rounded-3xl p-8 shadow-2xl">
            <h3 id="res-name" class="text-3xl font-black"></h3>
            <p id="res-desc" class="text-slate-600 mt-2"></p>
        </div>
        <div id="error-box" class="hidden mt-4 bg-red-100 text-red-700 p-4 rounded-2xl"></div>
    </main>

    <script type="module">
        // 1. IMPORTAR FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 2. CONFIGURACIÓN (TUS CLAVES)
        const firebaseConfig = {
            apiKey: "AIzaSyBrM3Akf9rh-HVNOgA9BhhRczAz2-yRG3w",
            authDomain: "omniscanner-ia.firebaseapp.com",
            projectId: "omniscanner-ia",
            storageBucket: "omniscanner-ia.firebasestorage.app",
            messagingSenderId: "989131635135",
            appId: "1:989131635135:web:86b52e4937ba53ce5f490a"
        };
        const geminiKey = "AIzaSyDZuCTFKhlSTWKgPiK5w8td2FqfHjrlisM";

        // 3. INICIALIZAR
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Lógica de la App ---
        const video = document.getElementById('video-feed');
        const canvas = document.getElementById('capture-canvas');
        const analyzeBtn = document.getElementById('analyze-btn');
        let base64Image = null;

        // Iniciar Cámara
        document.getElementById('camera-btn').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.classList.remove('hidden');
            document.getElementById('initial-ui').classList.add('hidden');
            document.getElementById('capture-btn').classList.remove('hidden');
        };

        // Capturar
        document.getElementById('capture-btn').onclick = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            base64Image = canvas.toDataURL('image/jpeg').split(',')[1];
            video.classList.add('hidden');
            document.getElementById('image-preview').src = canvas.toDataURL('image/jpeg');
            document.getElementById('image-preview').classList.remove('hidden');
            analyzeBtn.disabled = false;
        };

        // Analizar y Guardar en Firebase
        analyzeBtn.onclick = async () => {
            document.getElementById('loading-state').classList.remove('hidden');
            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Identifica esta planta/insecto. Responde solo JSON: {nombre, descripcion}" }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }]
                    })
                });
                const data = await resp.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // MOSTRAR RESULTADO
                document.getElementById('res-name').textContent = result.nombre;
                document.getElementById('res-desc').textContent = result.descripcion;
                document.getElementById('results-area').classList.remove('hidden');

                // GUARDAR EN FIREBASE
                await addDoc(collection(db, "avistamientos"), {
                    nombre: result.nombre,
                    descripcion: result.descripcion,
                    fecha: new Date()
                });
                console.log("¡Guardado en Firebase!");

            } catch (e) {
                document.getElementById('error-box').textContent = "Error: " + e.message;
                document.getElementById('error-box').classList.remove('hidden');
            }
            document.getElementById('loading-state').classList.add('hidden');
        };
    </script>
</body>
</html>
